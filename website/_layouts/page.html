---
layout: default
---
<section class="page-hero" {% if page.hero_bg %}style="background-color:{{ page.hero_bg }}"{% endif %}>
  <div class="container">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>
<section class="page-content">
  <div class="container">
    {{ content }}
  </div>
</section>
